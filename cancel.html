<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Canceled | Trenzoo</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Manrope", "Segoe UI", sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(145deg, #f6f2eb, #eaf0f6);
        color: #152028;
      }
      .card {
        width: min(560px, 92vw);
        background: #fffdf8;
        border: 1px solid #dfd6c8;
        border-radius: 18px;
        padding: 1.5rem;
        box-shadow: 0 18px 34px rgba(21, 32, 40, 0.08);
      }
      h1 {
        margin: 0 0 0.7rem;
        font-size: 1.8rem;
      }
      p {
        margin: 0 0 1rem;
        color: #4f616e;
      }
      a {
        display: inline-block;
        padding: 0.7rem 1rem;
        border-radius: 999px;
        background: #152028;
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Payment canceled</h1>
      <p>No charge was made. You can return to your cart and try again.</p>
      <a href="/">Return to Checkout</a>
    </main>
  </body>
</html>
